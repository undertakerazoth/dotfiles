# ~/.config/kitty/kitty.conf

# Font
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5

# Window
background_opacity 0.88
dynamic_background_opacity yes
window_padding_width 8
hide_window_decorations yes
confirm_os_window_close 0

# Cursor
cursor #c1121f
cursor_text_color #0d0d0d
cursor_shape block
cursor_blink_interval 0.6

# Mouse
mouse_hide_wait 2.0

# Scrollback
scrollback_lines 10000

# Bell
enable_audio_bell no
visual_bell_duration 0.1

# Main colors
foreground #d8ccb8
background #0d0d0d
selection_foreground #ffffff
selection_background #8b0000

# Black
color0  #0d0d0d
color8  #3a3a3a

# Red
color1  #8b0000
color9  #ff3333

# Green / muted machine glow
color2  #5f7f5f
color10 #8faa8f

# Brass / gold
color3  #b08d57
color11 #e0c097

# Blue muted, reduced so it doesn't dominate
color4  #4f5f73
color12 #6f7f93

# Magenta / dark ritual purple
color5  #7a3a4a
color13 #a64a5a

# Cyan / data-link
color6  #6f8f8f
color14 #8fb0b0

# White / parchment
color7  #d8ccb8
color15 #ffffff

# Tabs
tab_bar_edge bottom
tab_bar_style powerline
active_tab_foreground #0d0d0d
active_tab_background #8b0000
inactive_tab_foreground #d8ccb8
inactive_tab_background #1a1a1a

# Copy / paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# New tab/window
map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab

# Font size controls
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0